# Production stack: pull pre-built images from ECR (registry injected at deploy time).
# Replace PLACEHOLDER_ECR_REGISTRY with your registry host, e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
      POSTGRES_DB: todo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: PLACEHOLDER_ECR_REGISTRY/todo-backend:latest
    environment:
      PORT: "5000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: todo_user
      DB_PASSWORD: todo_password
      DB_NAME: todo_db
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: PLACEHOLDER_ECR_REGISTRY/todo-frontend:latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
