name: CI + Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  APP_DIR: /home/ubuntu/app
  FRONTEND_PORT: "80"

jobs:
  ci:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_password
          POSTGRES_DB: todo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todo_user -d todo_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend - install dependencies
        working-directory: backend
        run: npm ci

      - name: Backend - lint
        working-directory: backend
        run: npm run lint

      - name: Backend - unit tests (against Postgres service)
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: todo_user
          DB_PASSWORD: todo_password
          DB_NAME: todo_db
        run: npm run test:ci

      - name: Frontend - install dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend - unit tests
        working-directory: frontend
        run: npm run test:ci

      - name: Frontend - build
        working-directory: frontend
        run: npm run build

  build-and-push:
    name: Build and push images to ECR
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build -t "${ECR_REGISTRY}/todo-backend:latest" -t "${ECR_REGISTRY}/todo-backend:${GITHUB_SHA}" ./backend
          docker push "${ECR_REGISTRY}/todo-backend:latest"
          docker push "${ECR_REGISTRY}/todo-backend:${GITHUB_SHA}"

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          docker build -t "${ECR_REGISTRY}/todo-frontend:latest" -t "${ECR_REGISTRY}/todo-frontend:${GITHUB_SHA}" ./frontend
          docker push "${ECR_REGISTRY}/todo-frontend:latest"
          docker push "${ECR_REGISTRY}/todo-frontend:${GITHUB_SHA}"

  deploy:
    name: Deploy to Staging EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.url.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: On EC2 - ECR login and app directory
        uses: appleboy/ssh-action@v1
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        with:
          host: ${{ secrets.STAGING_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}
          envs: AWS_REGION,ECR_REGISTRY
          script: |
            set -e
            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            mkdir -p ${{ env.APP_DIR }}

      - name: Rsync docker-compose.prod.yml to EC2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY_STAGING }}
          REMOTE_HOST: ${{ secrets.STAGING_IP }}
          REMOTE_USER: ${{ secrets.EC2_USERNAME }}
        run: |
          set -e
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts
          rsync -avz \
            -e "ssh -i ~/.ssh/ec2_deploy_key -o StrictHostKeyChecking=no" \
            docker-compose.prod.yml \
            "${REMOTE_USER}@${REMOTE_HOST}:${{ env.APP_DIR }}/"

      - name: On EC2 - substitute registry, pull, and start stack
        uses: appleboy/ssh-action@v1
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          FRONTEND_PORT: ${{ env.FRONTEND_PORT }}
        with:
          host: ${{ secrets.STAGING_IP }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}
          envs: ECR_REGISTRY,FRONTEND_PORT
          script: |
            set -e
            cd ${{ env.APP_DIR }}
            sed -i "s|PLACEHOLDER_ECR_REGISTRY|${ECR_REGISTRY}|g" docker-compose.prod.yml
            export FRONTEND_PORT
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps

      - name: Set deployment URL output
        id: url
        run: echo "url=http://${{ secrets.STAGING_IP }}" >> "$GITHUB_OUTPUT"

  notify:
    name: Notify
    needs: [ci, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for commit author lookup)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve developer email
        id: dev
        run: |
          PR_EMAIL="${{ github.event.pull_request.user.email }}"
          COMMIT_EMAIL="$(git log -1 --pretty=format:'%ae' || true)"
          if [ -n "$PR_EMAIL" ]; then
            echo "email=$PR_EMAIL" >> "$GITHUB_OUTPUT"
          elif [ -n "$COMMIT_EMAIL" ]; then
            echo "email=$COMMIT_EMAIL" >> "$GITHUB_OUTPUT"
          else
            echo "email=" >> "$GITHUB_OUTPUT"
          fi

      - name: Send SUCCESS email to clients / team
        if: needs.ci.result == 'success' && needs.deploy.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: "CI Bot <${{ secrets.EMAIL_USER }}>"
          to: ${{ secrets.QA_EMAIL }}
          cc: ${{ secrets.INSTRUCTOR_EMAIL }}
          subject: "[Staging] Deployment SUCCESS - ${{ github.repository }}"
          body: |
            Hi all,

            New changes have been deployed to the Staging environment.

            Repository : ${{ github.repository }}
            Trigger    : ${{ github.event_name }}
            Actor      : ${{ github.actor }}
            Branch     : ${{ github.ref_name }}
            Commit     : ${{ github.sha }}

            Application URL: ${{ needs.deploy.outputs.url }}
            Health endpoint: ${{ needs.deploy.outputs.url }}/api/health

            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Regards,
            CI Bot

      - name: Send FAILURE email to instructor + developer
        if: needs.ci.result != 'success' || needs.deploy.result != 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          from: "CI Bot <${{ secrets.EMAIL_USER }}>"
          to: ${{ secrets.INSTRUCTOR_EMAIL }}
          cc: ${{ steps.dev.outputs.email }}
          subject: "[Staging] Deployment FAILED - ${{ github.repository }}"
          body: |
            The Staging deployment workflow has FAILED.

            Repository  : ${{ github.repository }}
            Trigger     : ${{ github.event_name }}
            Developer   : ${{ github.actor }} <${{ steps.dev.outputs.email }}>
            Branch      : ${{ github.ref_name }}
            Commit      : ${{ github.sha }}

            CI job     : ${{ needs.ci.result }}
            Deploy job : ${{ needs.deploy.result }}

            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
