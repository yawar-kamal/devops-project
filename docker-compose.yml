services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_password
      POSTGRES_DB: todo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Host 5433 avoids collision with a local PostgreSQL install on 5432 (common on Windows).
    # Backend on the host should use DB_PORT=5433; services inside this compose still use db:5432.
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo_user -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      PORT: "5000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: todo_user
      DB_PASSWORD: todo_password
      DB_NAME: todo_db
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
